<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A2540">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GCCB">
<link rel="manifest" href="manifest.webmanifest?v=25">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=25">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=25">
<title>GCCB Shot Tracker</title>
<style>
  :root {
    --bg: #0A2540;
    --bg-elev: #0e2c4d;
    --bg-input: #0e2c4d;
    --line: #1e406b;
    --text: #ffffff;
    --muted: #a8b6cc;
    --accent: #B3A16E;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 10px 12px 6px;
  }
  header img { height: 64px; width: auto; display: block; }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.5px;
  }
  .hole-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .hole-nav-btn {
    background: none;
    border: none;
    color: var(--text);
    font-size: 28px;
    line-height: 1;
    font-weight: 700;
    padding: 0 6px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .hole-nav-btn:disabled { opacity: 0.3; }
  .hole-select-wrap {
    flex: 1;
    position: relative;
  }
  select#holeSelect {
    width: 100%;
    background: transparent;
    color: var(--text);
    border: none;
    padding: 0 14px 0 0;
    font-size: 22px;
    font-weight: 700;
    appearance: none;
    -webkit-appearance: none;
    text-align: center;
    text-align-last: center;
    line-height: 1;
  }
  .hole-select-wrap::after {
    content: "▾";
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--muted);
    font-size: 12px;
  }
  .nine-tabs {
    display: flex;
    gap: 6px;
    padding: 0 12px 8px;
  }
  .nine-tabs button {
    flex: 1;
    background: var(--bg-input);
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px;
    font-size: 13px;
    font-weight: 600;
  }
  .nine-tabs button.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .hole-grid {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 6px;
    padding: 0 12px 10px;
    justify-items: center;
  }
  .hole-grid button {
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 50%;
    aspect-ratio: 1 / 1;
    width: 100%;
    max-width: 36px;
    padding: 0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hole-grid button.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 12px;
    background: var(--bg-elev);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .info-row label {
    font-size: 13px;
    color: var(--muted);
    margin-right: 6px;
  }
  .info-row select {
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    font-weight: 600;
  }
  .info-row option[value="RED"] { color: #ff5252; }
  .info-row option[value="BLUE"] { color: #87CEFA; }
  .info-row option[value="YELLOW"] { color: gold; }
  .info-row option[value="WHITE"] { color: #fff; }
  #teeboxSelect option[value="RED"] { color: #ff5252; }
  #teeboxSelect option[value="BLUE"] { color: #87CEFA; }
  #teeboxSelect option[value="YELLOW"] { color: gold; }
  #teeboxSelect option[value="WHITE"] { color: #fff; }
  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .switch {
    position: relative;
    display: inline-block;
    width: 46px;
    height: 26px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: #4a6789;
    border-radius: 26px;
    transition: 0.2s;
    cursor: pointer;
  }
  .slider:before {
    content: "";
    position: absolute;
    left: 3px; bottom: 3px;
    width: 20px; height: 20px;
    background: #fff;
    border-radius: 50%;
    transition: 0.2s;
  }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider:before { transform: translateX(20px); }
  .clear-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
  }
  .canvas-wrap {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 14px;
    padding: 12px;
  }
  #canvas {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 4px;
    width: min(calc((100vw - 24px) / 2), 180px);
    height: auto;
    aspect-ratio: 210 / 700;
    display: block;
    flex-shrink: 0;
    /* single-finger gestures handled in JS (drag); two-finger pinch
       still drives page zoom */
    touch-action: pinch-zoom;
  }
  .hole-info {
    flex: 1;
    max-width: 180px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding-top: 4px;
  }
  .hole-info .row {
    display: flex;
    flex-direction: row;
    align-items: baseline;
    gap: 10px;
  }
  .hole-info .lbl {
    color: var(--muted);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .hole-info .val {
    color: var(--text);
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
  }
  .hole-info .val .sub {
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    margin-left: 4px;
    white-space: nowrap;
  }
  .hole-video {
    padding: 0 12px 12px;
  }
  .hole-video .embed {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .hole-video iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  .page-footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.6;
    padding: 8px 12px 20px;
  }
  .page-footer img {
    height: 56px;
    width: auto;
    display: block;
    margin: 0 auto 12px;
  }
  .hole-info .row.inline {
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .hole-info select {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 14px;
    font-weight: 600;
    appearance: none;
    -webkit-appearance: none;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding: 6px 12px 16px;
    line-height: 1.5;
  }

  /* First-visit welcome modal */
  #welcomeModal {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10, 37, 64, 0.78);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    padding: 20px;
  }
  #welcomeModal[hidden] { display: none; }
  #welcomeModal .modal-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px 20px 18px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  #welcomeModal img {
    height: 48px;
    width: auto;
    margin-bottom: 12px;
  }
  #welcomeModal p {
    color: var(--text);
    font-size: 15px;
    line-height: 1.4;
    margin: 0 0 18px;
  }
  #welcomeModal button {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    min-width: 120px;
  }
</style>
</head>
<body>

<header>
  <img src="assets/logo.png?v=25" alt="GCCB">
</header>

<div class="nine-tabs" id="nineTabs">
  <button data-nine="front" class="active">Front 9 (1–9)</button>
  <button data-nine="back">Back 9 (10–18)</button>
</div>

<div class="hole-grid" id="holeGrid"></div>

<div class="canvas-wrap">
  <canvas id="canvas" width="840" height="2800"></canvas>
  <aside class="hole-info" id="holeInfo">
    <div class="hole-nav">
      <button class="hole-nav-btn" id="prevBtn" aria-label="Previous hole">‹</button>
      <div class="hole-select-wrap">
        <select id="holeSelect"></select>
      </div>
      <button class="hole-nav-btn" id="nextBtn" aria-label="Next hole">›</button>
    </div>
    <div class="row"><span class="lbl">Par</span><span class="val" id="parVal">—</span></div>
    <div class="row"><span class="lbl">Meters</span><span class="val" id="distVal">—</span></div>
    <div class="row"><span class="lbl">HCP</span><span class="val" id="hcpVal">—</span></div>
    <div class="row inline">
      <span class="lbl">Point-to-point</span>
      <label class="switch">
        <input type="checkbox" id="measurementMode">
        <span class="slider round"></span>
      </label>
    </div>
    <div class="row inline">
      <label class="lbl" for="teeboxSelect">Teebox</label>
      <select id="teeboxSelect">
        <option value="RED">53 (RED)</option>
        <option value="BLUE">55 (BLUE)</option>
        <option value="YELLOW">59 (YELLOW)</option>
        <option value="WHITE" selected>62 (WHITE)</option>
      </select>
    </div>
  </aside>
</div>

<div class="hole-video">
  <div class="embed">
    <iframe id="holeVideo" src="" title="Hole video"
            allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>
  </div>
</div>

<div class="page-footer">
  <img src="assets/logo.png?v=25" alt="GCCB">
  © Golf &amp; Country Club Basel<br>
  by Florian Bertram<br>
  2026
</div>

<div id="welcomeModal" hidden role="dialog" aria-modal="true" aria-labelledby="welcomeText">
  <div class="modal-card">
    <img src="assets/logo.png?v=25" alt="GCCB">
    <p id="welcomeText">Welcome! Tap on the fairway to see the distance from the selected teebox and distance to the green</p>
    <button id="welcomeOk" type="button">Got it</button>
  </div>
</div>

<script src="app.js?v=25"></script>
</body>
</html>
